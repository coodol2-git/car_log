<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>차량일지(모바일 단순형)</title>
<style>
  /* iPhone13 mini 기준 폭 375px 최적화 + 반응형 */
  :root{--yellow:#ffd700;--muted:#f4f6f7;--border:#dfe7ea;}
  html,body{height:100%;margin:0;font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;background:#fafbfd;color:#222}
  .wrap{max-width:420px;margin:12px auto;background:#fff;border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.04)}
  header{background:var(--yellow);padding:12px 16px;border-bottom:3px solid #e6c200}
  header h1{margin:0;font-size:18px;text-align:center;font-weight:700}
  .controls{display:flex;gap:8px;padding:10px 12px;align-items:center;flex-wrap:wrap}
  .controls .btn{flex:1;padding:10px;border-radius:8px;border:0;font-weight:700;font-size:14px;cursor:pointer}
  .btn.primary{background:#0078d4;color:white}
  .btn.ghost{background:white;border:1px solid var(--border);color:#333}
  .list{padding:8px 12px;max-height:62vh;overflow:auto}
  .row{display:flex;gap:8px;align-items:center;padding:8px;margin-bottom:8px;border-radius:8px;background:linear-gradient(#fff,#fff);border:1px solid transparent}
  .row:nth-child(even){background:var(--muted)}
  .row .col{font-size:13px}
  .col.small{width:58px}
  .col.date{display:flex;flex-direction:column;gap:4px}
  input[type="number"], input[type="text"], select {width:100%;box-sizing:border-box;padding:8px;border:1px solid #e3e9ec;border-radius:6px;font-size:13px}
  input[type="text"].small,input[type="number"].small{padding:6px}
  .row .note{flex:1}
  .row .actions{display:flex;flex-direction:column;gap:6px}
  .smallbtn{padding:6px 8px;border-radius:6px;border:0;font-weight:700;font-size:12px;cursor:pointer}
  .smallbtn.danger{background:#ff6b6b;color:#fff}
  .summary{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
  .summary .info{flex:1;background:#fff;border:1px solid var(--border);padding:8px;border-radius:6px;text-align:center}
  .summary .info p{margin:0;font-weight:700;font-size:14px}
  .note{font-size:12px;color:#666;padding:8px 12px}
  /* 모바일 터치 편의 */
  button,input,select{touch-action:manipulation}
  @media (max-width:380px){
    .controls .btn{font-size:13px;padding:9px}
    .col.small{width:52px}
  }
</style>
</head>
<body>
<div class="wrap" role="application" aria-label="차량일지 모바일 단순형">
  <header><h1>차량일지 (모바일 단순형)</h1></header>

  <div class="controls">
    <button id="addBtn" class="btn primary">행 추가</button>
    <button id="exportBtn" class="btn ghost">CSV 내보내기</button>
    <label class="btn ghost" style="display:inline-flex;align-items:center;gap:8px;cursor:pointer">
      불러오기<input id="importFile" type="file" accept=".csv,text/csv" style="display:none">
    </label>
  </div>

  <div class="list" id="list">
    <!-- 행들이 이곳에 추가됩니다 -->
  </div>

  <div class="summary">
    <div class="info">
      <div style="font-size:12px;color:#666">총 운행거리 합계</div>
      <p id="sumDistance">0</p>
    </div>
    <div class="info">
      <div style="font-size:12px;color:#666">총 주유비</div>
      <p id="sumFuel">0</p>
    </div>
  </div>

  <div class="note">팁: iPhone에서 '공유 → 홈 화면에 추가'하면 앱처럼 사용 가능합니다.</div>
</div>

<script>
/* 설정 */
const STORAGE_KEY = 'mobile_carlog_v1';
const EXPIRE_DAYS = 365;

/* DOM */
const listEl = document.getElementById('list');
const addBtn = document.getElementById('addBtn');
const exportBtn = document.getElementById('exportBtn');
const importFile = document.getElementById('importFile');
const sumDistanceEl = document.getElementById('sumDistance');
const sumFuelEl = document.getElementById('sumFuel');

/* 유틸 */
function saveAll(items){
  const payload = {savedAt: Date.now(),items};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
}
function loadAll(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return [];
  try{
    const p = JSON.parse(raw);
    const ageDays = (Date.now() - (p.savedAt||0)) / (1000*60*60*24);
    if(ageDays > EXPIRE_DAYS){ localStorage.removeItem(STORAGE_KEY); return []; }
    return p.items || [];
  }catch(e){ localStorage.removeItem(STORAGE_KEY); return []; }
}
function numberWithCommas(x){ return String(x).replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

/* 행 생성 (data optional) */
function createRow(data){
  const container = document.createElement('div');
  container.className = 'row';

  // 날짜: 연/월/일 select/number
  const dateCol = document.createElement('div'); dateCol.className='col date small';
  const year = document.createElement('input'); year.type='number'; year.className='small'; year.placeholder='YYYY'; year.style.width='100%';
  const month = document.createElement('input'); month.type='number'; month.className='small'; month.placeholder='MM'; month.style.width='100%';
  const day = document.createElement('input'); day.type='number'; day.className='small'; day.placeholder='DD'; day.style.width='100%';
  dateCol.appendChild(year); dateCol.appendChild(month); dateCol.appendChild(day);

  // 운행거리
  const distanceCol = document.createElement('div'); distanceCol.className='col small';
  const distance = document.createElement('input'); distance.type='number'; distance.className='small'; distance.placeholder='km';
  distanceCol.appendChild(distance);

  // 주유비
  const fuelCol = document.createElement('div'); fuelCol.className='col small';
  const fuel = document.createElement('input'); fuel.type='number'; fuel.className='small'; fuel.placeholder='₩';
  fuelCol.appendChild(fuel);

  // 비고
  const noteCol = document.createElement('div'); noteCol.className='col note';
  const note = document.createElement('input'); note.type='text'; note.placeholder='비고';
  noteCol.appendChild(note);

  // 액션
  const actions = document.createElement('div'); actions.className='actions';
  const delBtn = document.createElement('button'); delBtn.className='smallbtn danger'; delBtn.textContent='삭제';
  actions.appendChild(delBtn);

  container.appendChild(dateCol);
  container.appendChild(distanceCol);
  container.appendChild(fuelCol);
  container.appendChild(noteCol);
  container.appendChild(actions);

  // 초기값 세팅
  if(data){
    year.value = data.year||'';
    month.value = data.month||'';
    day.value = data.day||'';
    distance.value = data.distance||'';
    fuel.value = data.fuel||'';
    note.value = data.note||'';
  }

  // 이벤트: 변경 시 저장 및 합계 갱신
  [year,month,day,distance,fuel,note].forEach(el => {
    el.addEventListener('input', ()=>{ persist(); updateSummary(); });
  });

  delBtn.addEventListener('click', ()=>{ container.remove(); persist(); updateSummary(); });

  return container;
}

/* 로컬 -> DOM 렌더 */
function renderAll(){
  listEl.innerHTML = '';
  const items = loadAll();
  if(items.length === 0){
    // 기본 한 행 표시
    listEl.appendChild(createRow());
  } else {
    items.forEach(it => listEl.appendChild(createRow(it)));
  }
  updateSummary();
}

/* DOM -> 로컬 저장 */
function persist(){
  const rows = Array.from(listEl.querySelectorAll('.row'));
  const items = rows.map(r=>{
    const [yearEl,monthEl,dayEl] = r.querySelectorAll('.date input');
    const distanceEl = r.querySelector('input[type="number"]');
    // 주의: 첫 number은 운행거리, 두번째는 주유비. 찾기 위해 순서 사용
    const nums = r.querySelectorAll('input[type="number"]');
    const dist = nums[0] ? nums[0].value : '';
    const fuel = nums[1] ? nums[1].value : '';
    return {
      year: yearEl.value||'', month: monthEl.value||'', day: dayEl.value||'',
      distance: dist, fuel: fuel,
      note: (r.querySelector('input[type="text"]')||{value:''}).value || ''
    };
  });
  saveAll(items);
}

/* 합계 계산 */
function updateSummary(){
  const rows = Array.from(listEl.querySelectorAll('.row'));
  let totalDist = 0, totalFuel = 0;
  rows.forEach(r=>{
    const nums = r.querySelectorAll('input[type="number"]');
    const d = Number(nums[0] ? nums[0].value : 0) || 0;
    const f = Number(nums[1] ? nums[1].value : 0) || 0;
    totalDist += d;
    totalFuel += f;
  });
  sumDistanceEl.textContent = numberWithCommas(totalDist);
  sumFuelEl.textContent = numberWithCommas(totalFuel);
}

/* CSV 내보내기 */
function exportCSV(){
  const rows = Array.from(listEl.querySelectorAll('.row'));
  const header = ['연도','월','일','운행거리','주유비','비고'];
  const lines = [header.join(',')];
  rows.forEach(r=>{
    const inputs = r.querySelectorAll('input');
    const year = inputs[0].value||'';
    const month = inputs[1].value||'';
    const day = inputs[2].value||'';
    const dist = inputs[3].value||'';
    const fuel = inputs[4].value||'';
    const note = inputs[5].value||'';
    const esc = v => (v+'').includes(',')||(''+v).includes('"') ? `"${(''+v).replace(/"/g,'""')}"` : v;
    lines.push([esc(year),esc(month),esc(day),esc(dist),esc(fuel),esc(note)].join(','));
  });
  const blob = new Blob([lines.join('\r\n')], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `carlog_mobile_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  URL.revokeObjectURL(url);
}

/* CSV 불러오기 (간단 파서) */
function parseCSV(text){
  const rows = text.split(/\r\n|\n/).filter(r=>r.trim());
  if(rows.length <= 1) return [];
  const data = [];
  for(let i=1;i<rows.length;i++){
    const line = rows[i];
    // 간단한 split(큰따옴표 처리 최소한)
    const cols = [];
    let cur='', inQ=false;
    for(let j=0;j<line.length;j++){
      const ch = line[j];
      if(ch === '"' ){
        if(inQ && line[j+1]==='"'){ cur+='"'; j++; }
        else inQ = !inQ;
      } else if(ch === ',' && !inQ){ cols.push(cur); cur=''; }
      else cur += ch;
    }
    cols.push(cur);
    data.push({
      year: cols[0]||'', month: cols[1]||'', day: cols[2]||'',
      distance: cols[3]||'', fuel: cols[4]||'', note: cols[5]||''
    });
  }
  return data;
}

/* 이벤트 바인딩 */
addBtn.addEventListener('click', ()=>{ listEl.appendChild(createRow()); persist(); updateSummary(); });
exportBtn.addEventListener('click', exportCSV);
importFile.addEventListener('change', (e)=>{
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{ const parsed = parseCSV(ev.target.result); if(parsed.length===0){ alert('불러올 데이터가 없습니다.'); return; } // replace mode
    listEl.innerHTML=''; parsed.forEach(d=>listEl.appendChild(createRow(d))); persist(); updateSummary();
  };
  reader.readAsText(f,'utf-8'); e.target.value='';
});

/* 초기 렌더 */
renderAll();

/* 가끔 UI 변화가 저장 안되는 경우 대비 autosave */
setInterval(()=>{ persist(); }, 5000);
</script>
</body>
</html>
