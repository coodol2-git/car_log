<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>Car Log (Cloud Sync)</title>
<style>
  :root{
    --yellow:#ffd700;
    --muted:#f4f6f7;
    --border:#dfe7ea;
    --touch:40px;
    --primary:#0078d4;
    --danger:#d83b01;
    --success:#107c10;
  }

  html,body{
    height:100%;
    margin:0;
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:#fafbfd;
    color:#222;
  }

  .wrap{
    width:375px;
    max-width:100%;
    margin:0 auto;
    background:#fff;
    border:1px solid var(--border);
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
  }

  header{
    background:var(--yellow);
    padding:10px 12px;
    border-bottom:3px solid #e6c200;
    flex-shrink:0;
  }

  header h1{
    margin:0;
    font-size:17px;
    text-align:center;
    font-weight:700;
  }

  .controls{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:6px;
    padding:8px 10px;
    align-items:center;
    flex-shrink:0;
  }

  .btn{
    padding:10px 4px;
    border-radius:8px;
    border:0;
    font-weight:700;
    font-size:12px;
    cursor:pointer;
    white-space:nowrap;
  }

  .btn.primary{
    background:var(--primary);
    color:#fff;
  }

  .btn.ghost{
    background:#fff;
    border:1px solid var(--border);
    color:#333;
  }

  .btn:disabled{
    opacity:.65;
    cursor:not-allowed;
  }

  .status{
    margin:0 10px 8px;
    padding:8px 10px;
    border-radius:8px;
    font-size:12px;
    display:none;
    line-height:1.45;
    white-space:pre-wrap;
  }

  .status.show{ display:block; }
  .status.info{
    background:#eef6fd;
    color:#134a7c;
    border:1px solid #cfe5f8;
  }
  .status.error{
    background:#fff2f0;
    color:#8a1f11;
    border:1px solid #ffd2cc;
  }
  .status.success{
    background:#effaf2;
    color:#1f6b35;
    border:1px solid #caeccf;
  }

  .list{
    padding:6px 8px;
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  .row{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:4px;
    align-items:start;
    padding:7px 6px;
    margin-bottom:6px;
    border-radius:8px;
    background:#fff;
    border:1px solid transparent;
    user-select:none;
    -webkit-user-select:none;
  }

  .row:nth-child(even){
    background:var(--muted);
  }

  .row.longpress{
    outline:2px dashed var(--primary);
  }

  .row.saving{
    opacity:.75;
  }

  .row.new-local{
    border:1px dashed #9bbfe0;
  }

  .col{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:0;
  }

  .col label{
    font-size:9.5px;
    color:#666;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  input[type="date"],
  input[type="number"],
  input[type="text"]{
    width:100%;
    box-sizing:border-box;
    padding:6px 4px;
    border:1px solid #e3e9ec;
    border-radius:5px;
    font-size:12px;
    min-height:var(--touch);
    -webkit-appearance:none;
    appearance:none;
    background:#fff;
  }

  .summary{
    padding:8px 10px;
    border-top:1px solid var(--border);
    display:flex;
    gap:6px;
    align-items:center;
    flex-shrink:0;
  }

  .summary .info{
    flex:1;
    background:#fff;
    border:1px solid var(--border);
    padding:7px 4px;
    border-radius:6px;
    text-align:center;
  }

  .summary .info p{
    margin:0;
    font-weight:700;
    font-size:13px;
  }

  .summary .info div{
    font-size:11px;
    color:#666;
  }

  .note-bottom{
    font-size:11px;
    color:#888;
    padding:6px 10px 10px;
    flex-shrink:0;
    text-align:center;
  }

  .empty{
    text-align:center;
    padding:20px;
    color:#888;
    font-size:13px;
  }

  #fileInput{
    display:none;
  }

  button,input,select{
    touch-action:manipulation;
  }
</style>
</head>
<body>
<div class="wrap" role="application" aria-label="Car Log">
  <header><h1>🚗 Car Log (Cloud)</h1></header>

  <div class="controls">
    <button id="addBtn" class="btn primary">+ Add Record</button>
    <button id="exportBtn" class="btn ghost">Export</button>
    <button id="importBtn" class="btn ghost">Import</button>
    <button id="refreshBtn" class="btn ghost">Refresh</button>
  </div>

  <div id="statusBox" class="status info" aria-live="polite"></div>

  <div class="list" id="list" aria-live="polite"></div>

  <div class="summary">
    <div class="info">
      <div>Total Distance</div>
      <p id="sumDistance">0</p>
    </div>
    <div class="info">
      <div>Total Fuel Cost</div>
      <p id="sumFuel">0</p>
    </div>
  </div>

  <div class="note-bottom">💡 Long press to delete / Auto-save on blur</div>

  <input id="fileInput" type="file" accept=".json,application/json" />
</div>

<script>
/**
 * Required sheet headers:
 * date, distance, fuel, note
 */
const API_URL = 'https://sheetdb.io/api/v1/jzbxxou5dzg57';

const listEl         = document.getElementById('list');
const addBtn         = document.getElementById('addBtn');
const exportBtn      = document.getElementById('exportBtn');
const importBtn      = document.getElementById('importBtn');
const refreshBtn     = document.getElementById('refreshBtn');
const fileInput      = document.getElementById('fileInput');
const sumDistanceEl  = document.getElementById('sumDistance');
const sumFuelEl      = document.getElementById('sumFuel');
const statusBox      = document.getElementById('statusBox');

function fmt(x){
  return String(x).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function showStatus(message, type = 'info'){
  statusBox.className = `status show ${type}`;
  statusBox.textContent = message;
}

function clearStatus(){
  statusBox.className = 'status info';
  statusBox.textContent = '';
}

async function getErrorText(res, label){
  let detail = '';
  try {
    detail = await res.text();
  } catch (_) {}
  throw new Error(`${label}: ${res.status}${detail ? ' / ' + detail : ''}`);
}

function normalizeItem(item){
  return {
    date: item?.date ?? '',
    distance: Number(item?.distance ?? 0),
    fuel: Number(item?.fuel ?? 0),
    note: item?.note ?? ''
  };
}

function getCurrentRowsData(){
  return Array.from(listEl.querySelectorAll('.row')).map(row => {
    const dateIn = row.querySelector('[data-field="date"]');
    const distIn = row.querySelector('[data-field="distance"]');
    const fuelIn = row.querySelector('[data-field="fuel"]');
    const noteIn = row.querySelector('[data-field="note"]');

    return normalizeItem({
      date: dateIn?.value || '',
      distance: distIn?.value || 0,
      fuel: fuelIn?.value || 0,
      note: noteIn?.value || ''
    });
  });
}

async function fetchLogs() {
  const res = await fetch(API_URL, { cache: 'no-store' });
  if (!res.ok) {
    await getErrorText(res, 'Load failed');
  }

  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

async function addLogToCloud(item) {
  const payloads = [
    { data: [item] },
    { data: item }
  ];

  let lastError = null;

  for (const payload of payloads) {
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const txt = await res.text();
        lastError = new Error(`Add failed: ${res.status}${txt ? ' / ' + txt : ''}`);
        continue;
      }

      try {
        return await res.json();
      } catch (_) {
        return true;
      }
    } catch (e) {
      lastError = e;
    }
  }

  throw lastError || new Error('Add failed');
}

async function updateLogToCloud(originalDate, updatedData) {
  if (!originalDate) {
    throw new Error('Missing original date for update.');
  }

  const res = await fetch(`${API_URL}/date/${encodeURIComponent(originalDate)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ data: updatedData })
  });

  if (!res.ok) {
    await getErrorText(res, 'Update failed');
  }

  try {
    return await res.json();
  } catch (_) {
    return true;
  }
}

async function deleteLogFromCloud(date) {
  if (!date) {
    throw new Error('Missing date for deletion.');
  }

  const res = await fetch(`${API_URL}/date/${encodeURIComponent(date)}`, {
    method: 'DELETE'
  });

  if (!res.ok) {
    await getErrorText(res, 'Delete failed');
  }

  try {
    return await res.json();
  } catch (_) {
    return true;
  }
}

function makeInput(labelText, inputType, fieldName, placeholder = '') {
  const col = document.createElement('div');
  col.className = 'col';

  const lbl = document.createElement('label');
  lbl.textContent = labelText;

  const inp = document.createElement('input');
  inp.type = inputType;
  inp.dataset.field = fieldName;
  if (placeholder) inp.placeholder = placeholder;

  col.appendChild(lbl);
  col.appendChild(inp);

  return { col, inp };
}

function createRow(data = null, isLocalNew = false){
  const row = document.createElement('div');
  row.className = 'row';

  if (isLocalNew) {
    row.classList.add('new-local');
  }

  const { col: colDate, inp: dateIn } = makeInput('Date', 'date', 'date');
  const { col: colDist, inp: distIn } = makeInput('Distance (km)', 'number', 'distance', '0');
  const { col: colFuel, inp: fuelIn } = makeInput('Fuel Cost', 'number', 'fuel', '0');
  const { col: colNote, inp: noteIn } = makeInput('Note', 'text', 'note', 'Memo');

  if (data) {
    const n = normalizeItem(data);
    dateIn.value = n.date || '';
    distIn.value = n.distance;
    fuelIn.value = n.fuel;
    noteIn.value = n.note;
  }

  let prevDate = data?.date || '';
  let isNewLocalRow = isLocalNew;

  async function saveRow() {
    const current = normalizeItem({
      date: dateIn.value,
      distance: distIn.value || 0,
      fuel: fuelIn.value || 0,
      note: noteIn.value || ''
    });

    if (!current.date) {
      updateSummary();
      return;
    }

    row.classList.add('saving');

    try {
      if (isNewLocalRow) {
        await addLogToCloud(current);
        isNewLocalRow = false;
        row.classList.remove('new-local');
        prevDate = current.date;
        showStatus('New record saved.', 'success');
      } else {
        await updateLogToCloud(prevDate || current.date, current);
        prevDate = current.date;
        showStatus('Record updated.', 'success');
      }
    } catch (e) {
      console.error(e);
      showStatus(e.message || 'Save failed.', 'error');
    } finally {
      row.classList.remove('saving');
      updateSummary();
    }
  }

  [dateIn, distIn, fuelIn, noteIn].forEach(el => {
    el.addEventListener('blur', saveRow);
  });

  addLongPress(row, 700, async () => {
    if (!confirm('Delete this row?')) {
      return;
    }

    try {
      if (!isNewLocalRow && dateIn.value) {
        await deleteLogFromCloud(dateIn.value);
      }

      row.remove();

      if (!listEl.querySelector('.row')) {
        listEl.innerHTML = '<div class="empty">No records. Tap Add Record.</div>';
      }

      updateSummary();
      showStatus('Record deleted.', 'success');
    } catch (e) {
      console.error(e);
      showStatus(e.message || 'Delete failed.', 'error');
    }
  });

  row.appendChild(colDate);
  row.appendChild(colDist);
  row.appendChild(colFuel);
  row.appendChild(colNote);

  return row;
}

function addLongPress(el, ms, cb){
  let timer = null;

  const start = () => {
    el.classList.add('longpress');
    timer = setTimeout(async () => {
      try {
        await cb();
      } finally {
        cleanup();
      }
    }, ms);
  };

  const cancel = () => {
    if (timer) {
      clearTimeout(timer);
      timer = null;
    }
    el.classList.remove('longpress');
  };

  const cleanup = () => cancel();

  el.addEventListener('touchstart', start, { passive: true });
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchcancel', cancel);

  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    start();
  });
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
}

function updateSummary(){
  let td = 0;
  let tf = 0;

  Array.from(listEl.querySelectorAll('.row')).forEach(r => {
    const dist = r.querySelector('[data-field="distance"]');
    const fuel = r.querySelector('[data-field="fuel"]');
    td += Number(dist?.value) || 0;
    tf += Number(fuel?.value) || 0;
  });

  sumDistanceEl.textContent = fmt(td);
  sumFuelEl.textContent = fmt(tf);
}

function renderList(items){
  listEl.innerHTML = '';

  if (!items || items.length === 0) {
    listEl.innerHTML = '<div class="empty">No records. Tap Add Record.</div>';
  } else {
    items.forEach(item => {
      listEl.appendChild(createRow(normalizeItem(item), false));
    });
  }

  updateSummary();
}

async function renderAll(){
  listEl.innerHTML = '<div class="empty">Syncing...</div>';

  try {
    clearStatus();
    const items = await fetchLogs();
    renderList(items);
  } catch (e) {
    console.error(e);
    listEl.innerHTML = '<div class="empty">Failed to load data.</div>';
    updateSummary();
    showStatus(e.message || 'Load failed.', 'error');
  }
}

function downloadJson(filename, data){
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

addBtn.addEventListener('click', () => {
  clearStatus();

  const emptyNotice = listEl.querySelector('.empty');
  if (emptyNotice) {
    listEl.innerHTML = '';
  }

  const today = new Date().toISOString().split('T')[0];
  const row = createRow({
    date: today,
    distance: 0,
    fuel: 0,
    note: 'New record'
  }, true);

  listEl.prepend(row);
  updateSummary();
  showStatus('A new row was added. Edit fields, then tap outside to save.', 'info');
});

exportBtn.addEventListener('click', () => {
  try {
    const rows = getCurrentRowsData();
    const filename = `car-log-${new Date().toISOString().slice(0,10)}.json`;
    downloadJson(filename, rows);
    showStatus('Export completed.', 'success');
  } catch (e) {
    console.error(e);
    showStatus('Export failed.', 'error');
  }
});

importBtn.addEventListener('click', () => {
  fileInput.value = '';
  fileInput.click();
});

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;

  try {
    const text = await file.text();
    const parsed = JSON.parse(text);

    if (!Array.isArray(parsed)) {
      throw new Error('Invalid file format. JSON array expected.');
    }

    const normalized = parsed.map(normalizeItem);
    renderList(normalized);
    showStatus('Import completed. Imported rows are currently local. Tap outside each row to save to cloud.', 'success');
  } catch (err) {
    console.error(err);
    showStatus(err.message || 'Import failed.', 'error');
  }
});

refreshBtn.addEventListener('click', async () => {
  await renderAll();
});

renderAll();
</script>
</body>
</html>
