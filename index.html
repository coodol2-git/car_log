<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>Car Log (Cloud Sync)</title>
<style>
  :root{
    --yellow:#ffd700;
    --muted:#f4f6f7;
    --border:#dfe7ea;
    --touch:40px;
    --primary:#0078d4;
    --danger:#d83b01;
    --success:#107c10;
  }

  html,body{
    height:100%;
    margin:0;
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:#fafbfd;
    color:#222;
  }

  .wrap{
    width:375px;
    max-width:100%;
    margin:0 auto;
    background:#fff;
    border:1px solid var(--border);
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
  }

  header{
    background:var(--yellow);
    padding:10px 12px;
    border-bottom:3px solid #e6c200;
    flex-shrink:0;
  }

  header h1{
    margin:0;
    font-size:17px;
    text-align:center;
    font-weight:700;
  }

  .controls{
    display:grid;
    grid-template-columns: repeat(5, 1fr);
    gap:6px;
    padding:8px 10px;
    align-items:center;
    flex-shrink:0;
  }

  .btn{
    padding:10px 4px;
    border-radius:8px;
    border:0;
    font-weight:700;
    font-size:11px;
    cursor:pointer;
    white-space:nowrap;
  }

  .btn.primary{
    background:var(--primary);
    color:#fff;
  }

  .btn.ghost{
    background:#fff;
    border:1px solid var(--border);
    color:#333;
  }

  .btn:disabled{
    opacity:.65;
    cursor:not-allowed;
  }

  .status{
    margin:0 10px 8px;
    padding:8px 10px;
    border-radius:8px;
    font-size:12px;
    display:none;
    line-height:1.45;
    white-space:pre-wrap;
  }

  .status.show{ display:block; }
  .status.info{
    background:#eef6fd;
    color:#134a7c;
    border:1px solid #cfe5f8;
  }
  .status.error{
    background:#fff2f0;
    color:#8a1f11;
    border:1px solid #ffd2cc;
  }
  .status.success{
    background:#effaf2;
    color:#1f6b35;
    border:1px solid #caeccf;
  }

  .list{
    padding:6px 8px;
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  .row{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:4px;
    align-items:start;
    padding:7px 6px;
    margin-bottom:6px;
    border-radius:8px;
    background:#fff;
    border:1px solid transparent;
    user-select:none;
    -webkit-user-select:none;
  }

  .row:nth-child(even){
    background:var(--muted);
  }

  .row.longpress{
    outline:2px dashed var(--primary);
  }

  .row.saving{
    opacity:.75;
  }

  .row.pending{
    border:1px dashed #9bbfe0;
  }

  .col{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:0;
  }

  .col label{
    font-size:9.5px;
    color:#666;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  input[type="date"],
  input[type="number"],
  input[type="text"]{
    width:100%;
    box-sizing:border-box;
    padding:6px 4px;
    border:1px solid #e3e9ec;
    border-radius:5px;
    font-size:12px;
    min-height:var(--touch);
    -webkit-appearance:none;
    appearance:none;
    background:#fff;
  }

  .summary{
    padding:8px 10px;
    border-top:1px solid var(--border);
    display:flex;
    gap:6px;
    align-items:center;
    flex-shrink:0;
  }

  .summary .info{
    flex:1;
    background:#fff;
    border:1px solid var(--border);
    padding:7px 4px;
    border-radius:6px;
    text-align:center;
  }

  .summary .info p{
    margin:0;
    font-weight:700;
    font-size:13px;
  }

  .summary .info div{
    font-size:11px;
    color:#666;
  }

  .note-bottom{
    font-size:11px;
    color:#888;
    padding:6px 10px 10px;
    flex-shrink:0;
    text-align:center;
  }

  .empty{
    text-align:center;
    padding:20px;
    color:#888;
    font-size:13px;
  }

  #fileInput{
    display:none;
  }

  button,input,select{
    touch-action:manipulation;
  }
</style>
</head>
<body>
<div class="wrap" role="application" aria-label="Car Log">
  <header><h1>🚗 Car Log (Cloud)</h1></header>

  <div class="controls">
    <button id="addBtn" class="btn primary">+ Add</button>
    <button id="csvBtn" class="btn ghost">CSV</button>
    <button id="excelBtn" class="btn ghost">Excel</button>
    <button id="importBtn" class="btn ghost">Import</button>
    <button id="refreshBtn" class="btn ghost">Refresh</button>
  </div>

  <div id="statusBox" class="status info" aria-live="polite"></div>

  <div class="list" id="list" aria-live="polite"></div>

  <div class="summary">
    <div class="info">
      <div>Total Distance</div>
      <p id="sumDistance">0</p>
    </div>
    <div class="info">
      <div>Total Fuel Cost</div>
      <p id="sumFuel">0</p>
    </div>
  </div>

  <div class="note-bottom">💡 Long press to delete / Auto-save on blur / Auto-sync across devices</div>

  <input id="fileInput" type="file" accept=".csv,.xls,.xlsx,.json,application/json,text/csv" />
</div>

<script>
const API_URL = 'https://sheetdb.io/api/v1/jzbxxou5dzg57';

const listEl         = document.getElementById('list');
const addBtn         = document.getElementById('addBtn');
const csvBtn         = document.getElementById('csvBtn');
const excelBtn       = document.getElementById('excelBtn');
const importBtn      = document.getElementById('importBtn');
const refreshBtn     = document.getElementById('refreshBtn');
const fileInput      = document.getElementById('fileInput');
const sumDistanceEl  = document.getElementById('sumDistance');
const sumFuelEl      = document.getElementById('sumFuel');
const statusBox      = document.getElementById('statusBox');

let isBusy = false;
let syncTimer = null;
let lastSyncHash = '';
let schemaMap = null;

const FIELD_ALIASES = {
  date: ['date', 'Date', 'DATE', 'day', 'Day', 'record_date', 'Record Date'],
  distance: ['distance', 'Distance', 'DISTANCE', 'km', 'KM', 'distance_km', 'Distance (km)', 'Distance(km)'],
  fuel: ['fuel', 'Fuel', 'FUEL', 'fuel_cost', 'Fuel Cost', 'cost', 'Cost'],
  note: ['note', 'Note', 'NOTE', 'memo', 'Memo', 'remark', 'Remark', 'remarks']
};

function fmt(x){
  return String(x).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function showStatus(message, type = 'info'){
  statusBox.className = `status show ${type}`;
  statusBox.textContent = message;
}

function clearStatus(){
  statusBox.className = 'status info';
  statusBox.textContent = '';
}

function setBusyState(value){
  isBusy = value;
  addBtn.disabled = value;
  csvBtn.disabled = value;
  excelBtn.disabled = value;
  importBtn.disabled = value;
  refreshBtn.disabled = value;
}

function hasFocusedInput(){
  const el = document.activeElement;
  return el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA');
}

function stableHash(items){
  return JSON.stringify(
    (items || [])
      .map(normalizeItem)
      .sort((a, b) => {
        const ad = String(a.date || '');
        const bd = String(b.date || '');
        if (ad !== bd) return ad.localeCompare(bd);
        const an = String(a.note || '');
        const bn = String(b.note || '');
        return an.localeCompare(bn);
      })
  );
}

function getTodayLocalDate(){
  const now = new Date();
  const tzOffset = now.getTimezoneOffset() * 60000;
  return new Date(now.getTime() - tzOffset).toISOString().slice(0, 10);
}

function requestUrl(path = '', params = {}){
  const url = new URL(API_URL + path);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null && v !== '') url.searchParams.set(k, v);
  });
  url.searchParams.set('_ts', Date.now());
  return url.toString();
}

async function readTextSafe(res){
  try {
    return await res.text();
  } catch (_) {
    return '';
  }
}

async function throwHttpError(res, label){
  const detail = await readTextSafe(res);
  throw new Error(`${label}: ${res.status}${detail ? ' / ' + detail : ''}`);
}

function normalizeItem(item){
  return {
    date: String(item?.date ?? '').trim(),
    distance: String(item?.distance ?? '0').trim(),
    fuel: String(item?.fuel ?? '0').trim(),
    note: String(item?.note ?? '').trim()
  };
}

function parseNumber(v){
  return Number(String(v ?? '').replace(/,/g, '').trim()) || 0;
}

function sortItems(items){
  return [...items].sort((a, b) => {
    const ad = String(a.date || '');
    const bd = String(b.date || '');
    if (ad !== bd) return ad.localeCompare(bd);
    return 0;
  });
}

function lowerTrim(s){
  return String(s || '').trim().toLowerCase();
}

function resolveHeaderName(keys, aliases, fallback = null){
  const normalizedKeys = keys.map(k => ({ original: k, norm: lowerTrim(k) }));
  for (const alias of aliases) {
    const found = normalizedKeys.find(k => k.norm === lowerTrim(alias));
    if (found) return found.original;
  }
  return fallback;
}

async function fetchSheetKeys(){
  const res = await fetch(requestUrl('/keys'), {
    method: 'GET',
    headers: { 'Accept': 'application/json' },
    cache: 'no-store'
  });

  if (!res.ok) {
    await throwHttpError(res, 'Keys load failed');
  }

  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

async function detectSchema(force = false){
  if (schemaMap && !force) return schemaMap;

  let keys = [];
  try {
    keys = await fetchSheetKeys();
  } catch (e) {
    console.warn('keys endpoint failed:', e);
  }

  if (!keys.length) {
    const rows = await fetchRawLogs();
    if (rows.length) {
      keys = Object.keys(rows[0]);
    }
  }

  if (!keys.length) {
    keys = ['date', 'distance', 'fuel', 'note'];
  }

  schemaMap = {
    keys,
    dateKey: resolveHeaderName(keys, FIELD_ALIASES.date, 'date'),
    distanceKey: resolveHeaderName(keys, FIELD_ALIASES.distance, 'distance'),
    fuelKey: resolveHeaderName(keys, FIELD_ALIASES.fuel, 'fuel'),
    noteKey: resolveHeaderName(keys, FIELD_ALIASES.note, 'note')
  };

  return schemaMap;
}

function apiRowFromCanonical(item){
  if (!schemaMap) throw new Error('Schema not initialized.');

  const n = normalizeItem(item);
  const row = {};
  row[schemaMap.dateKey] = n.date;
  row[schemaMap.distanceKey] = n.distance;
  row[schemaMap.fuelKey] = n.fuel;
  row[schemaMap.noteKey] = n.note;
  return row;
}

function canonicalFromApiRow(row){
  if (!schemaMap) return normalizeItem(row);

  return normalizeItem({
    date: row?.[schemaMap.dateKey] ?? '',
    distance: row?.[schemaMap.distanceKey] ?? 0,
    fuel: row?.[schemaMap.fuelKey] ?? 0,
    note: row?.[schemaMap.noteKey] ?? ''
  });
}

async function fetchRawLogs() {
  const url = requestUrl('', {
    sort_by: 'date',
    sort_order: 'asc',
    sort_method: 'date',
    sort_date_format: 'Y-m-d'
  });

  const res = await fetch(url, {
    method: 'GET',
    headers: { 'Accept': 'application/json' },
    cache: 'no-store'
  });

  if (!res.ok) {
    await throwHttpError(res, 'Load failed');
  }

  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

async function fetchLogs() {
  await detectSchema();
  const rows = await fetchRawLogs();
  return sortItems(rows.map(canonicalFromApiRow));
}

async function addLogToCloud(item) {
  await detectSchema();
  const row = apiRowFromCanonical(item);

  const res = await fetch(requestUrl(''), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json'
    },
    body: JSON.stringify({ data: [row] })
  });

  if (!res.ok) {
    await throwHttpError(res, 'Add failed');
  }

  try {
    return await res.json();
  } catch (_) {
    return true;
  }
}

async function updateLogToCloud(originalDate, updatedData) {
  if (!originalDate) throw new Error('Missing original date for update.');

  await detectSchema();
  const row = apiRowFromCanonical(updatedData);

  const res = await fetch(
    requestUrl(`/${encodeURIComponent(schemaMap.dateKey)}/${encodeURIComponent(originalDate)}`),
    {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Accept': 'application/json'
      },
      body: JSON.stringify({ data: row })
    }
  );

  if (!res.ok) {
    await throwHttpError(res, 'Update failed');
  }

  try {
    return await res.json();
  } catch (_) {
    return true;
  }
}

async function deleteLogFromCloud(date) {
  if (!date) throw new Error('Missing date for deletion.');

  await detectSchema();

  const res = await fetch(
    requestUrl(`/${encodeURIComponent(schemaMap.dateKey)}/${encodeURIComponent(date)}`),
    {
      method: 'DELETE',
      headers: { 'Accept': 'application/json' }
    }
  );

  if (!res.ok) {
    await throwHttpError(res, 'Delete failed');
  }

  try {
    return await res.json();
  } catch (_) {
    return true;
  }
}

function makeInput(labelText, inputType, fieldName, placeholder = '') {
  const col = document.createElement('div');
  col.className = 'col';

  const lbl = document.createElement('label');
  lbl.textContent = labelText;

  const inp = document.createElement('input');
  inp.type = inputType;
  inp.dataset.field = fieldName;
  if (placeholder) inp.placeholder = placeholder;

  col.appendChild(lbl);
  col.appendChild(inp);

  return { col, inp };
}

function getCurrentRowsData(){
  return Array.from(listEl.querySelectorAll('.row')).map(row => {
    const dateIn = row.querySelector('[data-field="date"]');
    const distIn = row.querySelector('[data-field="distance"]');
    const fuelIn = row.querySelector('[data-field="fuel"]');
    const noteIn = row.querySelector('[data-field="note"]');

    return normalizeItem({
      date: dateIn?.value || '',
      distance: distIn?.value || 0,
      fuel: fuelIn?.value || 0,
      note: noteIn?.value || ''
    });
  });
}

function createRow(data = null, isPending = false){
  const row = document.createElement('div');
  row.className = 'row';

  if (isPending) row.classList.add('pending');

  const { col: colDate, inp: dateIn } = makeInput('Date', 'date', 'date');
  const { col: colDist, inp: distIn } = makeInput('Distance (km)', 'number', 'distance', '0');
  const { col: colFuel, inp: fuelIn } = makeInput('Fuel Cost', 'number', 'fuel', '0');
  const { col: colNote, inp: noteIn } = makeInput('Note', 'text', 'note', 'Memo');

  if (data) {
    const n = normalizeItem(data);
    dateIn.value = n.date || '';
    distIn.value = n.distance;
    fuelIn.value = n.fuel;
    noteIn.value = n.note;
  }

  let prevDate = data?.date || '';
  let pendingCreate = isPending;
  let saveLock = false;

  async function saveRow() {
    if (saveLock) return;

    const current = normalizeItem({
      date: dateIn.value,
      distance: distIn.value || 0,
      fuel: fuelIn.value || 0,
      note: noteIn.value || ''
    });

    if (!current.date) {
      updateSummary();
      return;
    }

    saveLock = true;
    row.classList.add('saving');

    try {
      if (pendingCreate) {
        await addLogToCloud(current);
        pendingCreate = false;
        row.classList.remove('pending');
        prevDate = current.date;
        await renderAll(true);
        showStatus('New record saved and synced.', 'success');
      } else {
        await updateLogToCloud(prevDate || current.date, current);
        prevDate = current.date;
        await renderAll(true);
        showStatus('Record updated and synced.', 'success');
      }
    } catch (e) {
      console.error(e);
      showStatus(e.message || 'Save failed.', 'error');
    } finally {
      row.classList.remove('saving');
      updateSummary();
      saveLock = false;
    }
  }

  [dateIn, distIn, fuelIn, noteIn].forEach(el => {
    el.addEventListener('blur', saveRow);
  });

  addLongPress(row, 700, async () => {
    if (!confirm('Delete this row?')) return;

    try {
      if (!pendingCreate && dateIn.value) {
        await deleteLogFromCloud(dateIn.value);
      }

      row.remove();

      if (!listEl.querySelector('.row')) {
        listEl.innerHTML = '<div class="empty">No records. Tap Add.</div>';
      }

      updateSummary();
      showStatus('Record deleted.', 'success');
      await renderAll(true);
    } catch (e) {
      console.error(e);
      showStatus(e.message || 'Delete failed.', 'error');
    }
  });

  row.appendChild(colDate);
  row.appendChild(colDist);
  row.appendChild(colFuel);
  row.appendChild(colNote);

  return row;
}

function addLongPress(el, ms, cb){
  let timer = null;

  const start = () => {
    el.classList.add('longpress');
    timer = setTimeout(async () => {
      try {
        await cb();
      } finally {
        cleanup();
      }
    }, ms);
  };

  const cancel = () => {
    if (timer) {
      clearTimeout(timer);
      timer = null;
    }
    el.classList.remove('longpress');
  };

  const cleanup = () => cancel();

  el.addEventListener('touchstart', start, { passive: true });
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchcancel', cancel);
  el.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    start();
  });
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
}

function updateSummary(){
  let td = 0;
  let tf = 0;

  Array.from(listEl.querySelectorAll('.row')).forEach(r => {
    const dist = r.querySelector('[data-field="distance"]');
    const fuel = r.querySelector('[data-field="fuel"]');
    td += parseNumber(dist?.value);
    tf += parseNumber(fuel?.value);
  });

  sumDistanceEl.textContent = fmt(td);
  sumFuelEl.textContent = fmt(tf);
}

function renderList(items){
  listEl.innerHTML = '';

  if (!items || items.length === 0) {
    listEl.innerHTML = '<div class="empty">No records. Tap Add.</div>';
  } else {
    sortItems(items).forEach(item => {
      listEl.appendChild(createRow(normalizeItem(item), false));
    });
  }

  updateSummary();
}

async function renderAll(silent = false){
  if (isBusy) return;
  if (hasFocusedInput()) return;

  try {
    if (!silent) {
      listEl.innerHTML = '<div class="empty">Syncing...</div>';
      clearStatus();
    }

    await detectSchema();
    const items = await fetchLogs();
    const hash = stableHash(items);

    if (hash !== lastSyncHash || !listEl.querySelector('.row')) {
      renderList(items);
      lastSyncHash = hash;
    }
  } catch (e) {
    console.error(e);
    if (!silent) {
      listEl.innerHTML = '<div class="empty">Failed to load data.</div>';
      updateSummary();
      showStatus(e.message || 'Load failed.', 'error');
    }
  }
}

/* ===== Export: CSV / Excel ===== */

function escapeCsvValue(value){
  const s = String(value ?? '');
  if (/[",\n]/.test(s)) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function convertRowsToCsv(rows){
  const headers = ['Date', 'Distance (km)', 'Fuel Cost', 'Note'];
  const lines = [headers.join(',')];

  rows.forEach(row => {
    lines.push([
      escapeCsvValue(row.date),
      escapeCsvValue(row.distance),
      escapeCsvValue(row.fuel),
      escapeCsvValue(row.note)
    ].join(','));
  });

  return "\uFEFF" + lines.join('\n');
}

function downloadFile(filename, content, mimeType){
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function exportCsv(){
  const rows = getCurrentRowsData();
  const csv = convertRowsToCsv(rows);
  downloadFile(
    `car-log-${getTodayLocalDate()}.csv`,
    csv,
    'text/csv;charset=utf-8;'
  );
}

function escapeHtml(value){
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function convertRowsToExcelHtml(rows){
  const bodyRows = rows.map(row => `
    <tr>
      <td>${escapeHtml(row.date)}</td>
      <td style="mso-number-format:'0';">${escapeHtml(row.distance)}</td>
      <td style="mso-number-format:'0';">${escapeHtml(row.fuel)}</td>
      <td>${escapeHtml(row.note)}</td>
    </tr>
  `).join('');

  return `
    <html xmlns:o="urn:schemas-microsoft-com:office:office"
          xmlns:x="urn:schemas-microsoft-com:office:excel"
          xmlns="http://www.w3.org/TR/REC-html40">
    <head>
      <meta charset="utf-8">
      <meta name="ProgId" content="Excel.Sheet">
      <meta name="Generator" content="ChatGPT">
    </head>
    <body>
      <table border="1">
        <thead>
          <tr>
            <th>Date</th>
            <th>Distance (km)</th>
            <th>Fuel Cost</th>
            <th>Note</th>
          </tr>
        </thead>
        <tbody>
          ${bodyRows}
        </tbody>
      </table>
    </body>
    </html>
  `;
}

function exportExcel(){
  const rows = getCurrentRowsData();
  const html = convertRowsToExcelHtml(rows);
  downloadFile(
    `car-log-${getTodayLocalDate()}.xls`,
    html,
    'application/vnd.ms-excel;charset=utf-8;'
  );
}

/* ===== Import ===== */

async function importJsonToCloud(rows){
  const imported = rows.map(normalizeItem).filter(item => item.date);

  if (imported.length === 0) {
    throw new Error('No valid rows found in file.');
  }

  const existing = await fetchLogs();
  const existingMap = new Map();

  existing.forEach(item => {
    if (item.date) existingMap.set(item.date, item);
  });

  let added = 0;
  let updated = 0;

  for (const item of imported) {
    if (existingMap.has(item.date)) {
      await updateLogToCloud(item.date, item);
      updated++;
    } else {
      await addLogToCloud(item);
      added++;
    }
  }

  return { total: imported.length, added, updated };
}

function parseCsvLine(line){
  const result = [];
  let current = '';
  let inQuotes = false;

  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    const next = line[i + 1];

    if (ch === '"' && inQuotes && next === '"') {
      current += '"';
      i++;
    } else if (ch === '"') {
      inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(current);
      current = '';
    } else {
      current += ch;
    }
  }

  result.push(current);
  return result;
}

function parseCsvText(text){
  const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/).filter(Boolean);
  if (lines.length < 2) throw new Error('CSV file is empty.');

  const headers = parseCsvLine(lines[0]).map(h => h.trim().toLowerCase());

  const idxDate = headers.findIndex(h => h === 'date');
  const idxDistance = headers.findIndex(h => h.includes('distance'));
  const idxFuel = headers.findIndex(h => h.includes('fuel'));
  const idxNote = headers.findIndex(h => h === 'note');

  if (idxDate < 0) throw new Error('CSV must include a Date column.');

  return lines.slice(1).map(line => {
    const cols = parseCsvLine(line);
    return normalizeItem({
      date: cols[idxDate] ?? '',
      distance: cols[idxDistance] ?? '0',
      fuel: cols[idxFuel] ?? '0',
      note: cols[idxNote] ?? ''
    });
  }).filter(row => row.date);
}

function startAutoSync(){
  stopAutoSync();
  syncTimer = setInterval(() => {
    if (document.visibilityState === 'visible') {
      renderAll(true);
    }
  }, 15000);
}

function stopAutoSync(){
  if (syncTimer) {
    clearInterval(syncTimer);
    syncTimer = null;
  }
}

/* ===== Events ===== */

addBtn.addEventListener('click', () => {
  clearStatus();

  const emptyNotice = listEl.querySelector('.empty');
  if (emptyNotice) listEl.innerHTML = '';

  const row = createRow({
    date: getTodayLocalDate(),
    distance: 0,
    fuel: 0,
    note: 'New record'
  }, true);

  listEl.appendChild(row);
  updateSummary();
  showStatus('A new row was added at the bottom. Edit fields, then tap outside to save.', 'info');
});

csvBtn.addEventListener('click', () => {
  try {
    exportCsv();
    showStatus('CSV export completed.', 'success');
  } catch (e) {
    console.error(e);
    showStatus('CSV export failed.', 'error');
  }
});

excelBtn.addEventListener('click', () => {
  try {
    exportExcel();
    showStatus('Excel export completed.', 'success');
  } catch (e) {
    console.error(e);
    showStatus('Excel export failed.', 'error');
  }
});

importBtn.addEventListener('click', () => {
  fileInput.value = '';
  fileInput.click();
});

fileInput.addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;

  try {
    setBusyState(true);
    showStatus('Importing file to cloud...', 'info');

    const text = await file.text();
    let parsed;

    if (file.name.toLowerCase().endsWith('.csv')) {
      parsed = parseCsvText(text);
    } else {
      parsed = JSON.parse(text);
      if (!Array.isArray(parsed)) {
        throw new Error('Invalid file format. JSON array expected.');
      }
    }

    const result = await importJsonToCloud(parsed);
    await renderAll(true);

    showStatus(
      `Import completed. Total: ${result.total}, Added: ${result.added}, Updated: ${result.updated}`,
      'success'
    );
  } catch (err) {
    console.error(err);
    showStatus(err.message || 'Import failed.', 'error');
  } finally {
    setBusyState(false);
  }
});

refreshBtn.addEventListener('click', async () => {
  await renderAll(false);
});

window.addEventListener('focus', () => renderAll(true));
window.addEventListener('pageshow', () => renderAll(true));
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    renderAll(true);
  }
});

renderAll(false);
startAutoSync();
</script>
