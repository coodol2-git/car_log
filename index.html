<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>Car Log (Cloud Sync)</title>
<style>
  :root{
    --yellow:#ffd700;
    --muted:#f4f6f7;
    --border:#dfe7ea;
    --touch:40px;
  }
  html,body{
    height:100%;
    margin:0;
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
    background:#fafbfd;
    color:#222;
  }

  .wrap{
    width:375px;
    max-width:100%;
    margin:0 auto;
    background:#fff;
    border:1px solid var(--border);
    border-radius:0;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
  }

  header{
    background:var(--yellow);
    padding:10px 12px;
    border-bottom:3px solid #e6c200;
    flex-shrink:0;
  }
  header h1{margin:0;font-size:17px;text-align:center;font-weight:700}

  .controls{
    display:flex;
    gap:6px;
    padding:8px 10px;
    align-items:center;
    flex-shrink:0;
  }
  .btn{
    flex:1;
    padding:9px 4px;
    border-radius:7px;
    border:0;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
  }
  .btn.primary{background:#0078d4;color:white}
  .btn.ghost{background:white;border:1px solid var(--border);color:#333}

  .list{
    padding:6px 8px;
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  .row{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:4px;
    align-items:start;
    padding:7px 6px;
    margin-bottom:6px;
    border-radius:8px;
    background:#fff;
    border:1px solid transparent;
    user-select:none;
    -webkit-user-select:none;
  }
  .row:nth-child(even){ background:var(--muted); }
  .row.longpress{ outline:2px dashed #0078d4; }

  .col{
    display:flex;
    flex-direction:column;
    gap:4px;
    min-width:0;
  }
  .col label{
    font-size:9.5px;
    color:#666;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  input[type="date"],
  input[type="number"],
  input[type="text"]{
    width:100%;
    box-sizing:border-box;
    padding:6px 4px;
    border:1px solid #e3e9ec;
    border-radius:5px;
    font-size:12px;
    min-height:var(--touch);
    -webkit-appearance:none;
    appearance:none;
  }

  .summary{
    padding:8px 10px;
    border-top:1px solid var(--border);
    display:flex;
    gap:6px;
    align-items:center;
    flex-shrink:0;
  }
  .summary .info{
    flex:1;
    background:#fff;
    border:1px solid var(--border);
    padding:7px 4px;
    border-radius:6px;
    text-align:center;
  }
  .summary .info p{margin:0;font-weight:700;font-size:13px}
  .summary .info div{font-size:11px;color:#666}

  .note-bottom{
    font-size:11px;
    color:#888;
    padding:6px 10px 10px;
    flex-shrink:0;
    text-align:center;
  }
  button,input,select{touch-action:manipulation}
</style>
</head>
<body>
<div class="wrap" role="application" aria-label="Car Log">
  <header><h1>🚗 Car Log (Cloud)</h1></header>

  <div class="controls">
    <button id="addBtn" class="btn primary">+ 새 기록 추가</button>
    <button id="refreshBtn" class="btn ghost">🔄 새로고침</button>
  </div>

  <div class="list" id="list" aria-live="polite"></div>

  <div class="summary">
    <div class="info">
      <div>총 운행거리</div>
      <p id="sumDistance">0</p>
    </div>
    <div class="info">
      <div>총 주유비</div>
      <p id="sumFuel">0</p>
    </div>
  </div>

  <div class="note-bottom">💡 길게 누르면 삭제 / 입력 후 포커스 이동 시 자동 저장</div>
</div>

<script>
/** * [설정] 유저님의 SheetDB API 주소
 * 구글 시트 첫 줄에 date, distance, fuel, note 헤더가 있어야 합니다.
 */
const API_URL = 'https://sheetdb.io/api/v1/jzbxxou5dzg57';

const listEl         = document.getElementById('list');
const addBtn         = document.getElementById('addBtn');
const refreshBtn     = document.getElementById('refreshBtn');
const sumDistanceEl  = document.getElementById('sumDistance');
const sumFuelEl      = document.getElementById('sumFuel');

// 데이터 로딩 (GET)
async function fetchLogs() {
  try {
    const res = await fetch(API_URL);
    return await res.json();
  } catch (e) {
    console.error("로드 실패:", e);
    return [];
  }
}

// 데이터 추가 (POST)
async function addLogToCloud(item) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: [item] })
    });
  } catch (e) { console.error("추가 실패:", e); }
}

// 데이터 수정 (PATCH) - 날짜를 기준으로 매칭하여 수정
async function updateLogToCloud(originalDate, updatedData) {
  if (!originalDate) return;
  try {
    await fetch(`${API_URL}/date/${originalDate}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ data: updatedData })
    });
  } catch (e) { console.error("수정 실패:", e); }
}

// 데이터 삭제 (DELETE)
async function deleteLogFromCloud(date) {
  if (!date) return;
  try {
    await fetch(`${API_URL}/date/${date}`, {
      method: 'DELETE'
    });
  } catch (e) { console.error("삭제 실패:", e); }
}

function fmt(x){ return String(x).replace(/\B(?=(\d{3})+(?!\d))/g,","); }

function createRow(data){
  const row = document.createElement('div');
  row.className='row';

  const makeCol = (labelText, inputType, placeholder) => {
    const col  = document.createElement('div'); col.className='col';
    const lbl  = document.createElement('label'); lbl.textContent=labelText;
    const inp  = document.createElement('input'); inp.type=inputType;
    if(placeholder) inp.placeholder=placeholder;
    col.appendChild(lbl); col.appendChild(inp);
    return { col, inp };
  };

  const { col:colDate, inp:dateIn } = makeCol('날짜','date','');
  const { col:colDist, inp:distIn } = makeCol('거리(km)','number','0');
  const { col:colFuel, inp:fuelIn } = makeCol('주유(₩)','number','0');
  const { col:colNote, inp:noteIn } = makeCol('비고','text','메모');

  if(data){
    dateIn.value = data.date || '';
    distIn.value = data.distance || '';
    fuelIn.value = data.fuel || '';
    noteIn.value = data.note || '';
  }

  // 입력 완료 시 자동 저장 로직
  let prevDate = dateIn.value;
  [dateIn, distIn, fuelIn, noteIn].forEach(el => {
    el.addEventListener('blur', async () => {
      const updated = {
        date: dateIn.value,
        distance: distIn.value,
        fuel: fuelIn.value,
        note: noteIn.value
      };
      await updateLogToCloud(prevDate || dateIn.value, updated);
      prevDate = dateIn.value; // 기준점 갱신
      updateSummary();
    });
  });

  addLongPress(row, 700, async ()=>{
    if(confirm(`해당 행을 클라우드에서 삭제할까요?`)){
      await deleteLogFromCloud(dateIn.value);
      row.remove(); 
      updateSummary();
    }
  });

  row.appendChild(colDate);
  row.appendChild(colDist);
  row.appendChild(colFuel);
  row.appendChild(colNote);
  return row;
}

function addLongPress(el, ms, cb){
  let timer=null;
  const start=()=>{ el.classList.add('longpress'); timer=setTimeout(()=>{ cb(); cleanup(); },ms); };
  const cancel=()=>{ if(timer){ clearTimeout(timer); timer=null; } el.classList.remove('longpress'); };
  const cleanup=()=>cancel();
  el.addEventListener('touchstart',start,{passive:true});
  el.addEventListener('touchend',cancel);
  el.addEventListener('mousedown',(e)=>{ if(e.button!==0)return; start(); });
  el.addEventListener('mouseup',cancel);
}

async function renderAll(){
  listEl.innerHTML = '<div style="text-align:center;padding:20px;font-size:13px;">동기화 중...</div>';
  const items = await fetchLogs();
  listEl.innerHTML = '';
  
  if(!items || items.length === 0) {
    // 시트가 비어있으면 안내 메시지
    listEl.innerHTML = '<div style="text-align:center;padding:20px;color:#888;font-size:13px;">기록이 없습니다. 추가 버튼을 눌러주세요.</div>';
  } else {
    items.forEach(it => listEl.appendChild(createRow(it)));
  }
  updateSummary();
}

function updateSummary(){
  let td=0, tf=0;
  Array.from(listEl.querySelectorAll('.row')).forEach(r=>{
    const n=r.querySelectorAll('input[type="number"]');
    td+=Number(n[0]?.value)||0;
    tf+=Number(n[1]?.value)||0;
  });
  sumDistanceEl.textContent=fmt(td);
  sumFuelEl.textContent=fmt(tf);
}

// 새 기록 추가 버튼
addBtn.addEventListener('click', async () => {
  const today = new Date().toISOString().split('T')[0];
  const newRow = { date: today, distance: 0, fuel: 0, note: '새 기록' };
  await addLogToCloud(newRow);
  renderAll(); // 추가 후 다시 로드
});

// 새로고침 버튼
refreshBtn.addEventListener('click', renderAll);

// 초기 실행
renderAll();
</script>
</body>
</html>
